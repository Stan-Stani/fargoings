name: Deploy to VPS
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Auto Bump Patch Version"]
    types: [completed]
jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            deploy_instance() {
              local dir="$1" session="$2" web_port="$3" api_port="$4"
              echo "=== Deploying ${session} (${dir}) ==="
              cd "${dir}"
              git fetch origin
              git reset --hard origin/main

              echo "Deployed commit: $(git rev-parse --short HEAD)"
              VERSION=$(node -p "require('./package.json').version")
              echo "package.json version: ${VERSION}"

              npm ci
              npm run web:build

              # Ensure old processes aren't still holding the ports (screen names can drift).
              for port in "${web_port}" "${api_port}"; do
                pid=$(ss -lptn "sport = :${port}" 2>/dev/null | sed -n 's/.*pid=\([0-9]\+\).*/\1/p' | head -n 1 || true)
                if [ -n "${pid}" ]; then
                  echo "Killing PID ${pid} on port ${port}"
                  kill "${pid}" 2>/dev/null || true
                  sleep 1
                  kill -9 "${pid}" 2>/dev/null || true
                fi
              done

              screen -S "${session}" -X quit 2>/dev/null || true
              screen -S "${session}-api" -X quit 2>/dev/null || true
              cd "${dir}" && screen -dmS "${session}" npm run web:prod

              # Smoke-test: verify the server is actually responding.
              for i in $(seq 1 30); do
                if curl -fsS "http://127.0.0.1:${api_port}/health" >/dev/null 2>&1; then
                  break
                fi
                sleep 1
              done
              curl -fsS "http://127.0.0.1:${api_port}/health"

              # Smoke-test: the API must serve actual event data (catches a
              # lost/empty DB, not just a live process). No freshness check —
              # deploys can land days after the weekly fetch.
              curl -fsS "http://127.0.0.1:${api_port}/api/events?pageSize=1" \
                | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{const j=JSON.parse(d);if(!Number.isInteger(j.total)||j.total<1){console.error("SMOKE FAIL: no events, total="+j.total);process.exit(1)}console.log("SMOKE OK: total="+j.total)})'

              # Informational only: per-source health (a flagged upstream
              # source must not fail a deploy).
              curl -fsS "http://127.0.0.1:${api_port}/api/health/sources" || true
              echo ""

              for i in $(seq 1 30); do
                if curl -fsS "http://127.0.0.1:${web_port}/" >/dev/null 2>&1; then
                  break
                fi
                sleep 1
              done
              curl -fsS "http://127.0.0.1:${web_port}/" >/dev/null
            }

            # fargoings.com (Fargo) and sufu.fargoings.com (Sioux Falls; the
            # dir and screen session keep the legacy "soogoings" name). The
            # port args must match each instance's .env (WEB_PORT/API_PORT).
            deploy_instance /root/fargoings fargoings 8787 8788
            deploy_instance /root/soogoings soogoings 8789 8790
