<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fargoings | Goings-On in Fargo</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f9fafb;
        --text: #111827;
        --muted: #6b7280;
        --meta: #4b5563;
        --surface: #ffffff;
        --surface-soft: #f9fafb;
        --surface-accent: #f3f4f6;
        --border: #d1d5db;
        --border-soft: #e5e7eb;
        --row-border: #f3f4f6;
        --scroll-thumb: #9ca3af;
        --scroll-thumb-hover: #6b7280;
        --scroll-track: #f3f4f6;
        --group-container-bg: #f8fafc;
        --group-header-bg: #eef2f6;
        --group-border: #cbd5e1;
        --accent-soft-bg: #ccfbf1;
        --accent-soft-text: #0f766e;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111827;
          --text: #f3f4f6;
          --muted: #9ca3af;
          --meta: #d1d5db;
          --surface: #1f2937;
          --surface-soft: #1f2937;
          --surface-accent: #374151;
          --border: #4b5563;
          --border-soft: #374151;
          --row-border: #374151;
          --scroll-thumb: #6b7280;
          --scroll-thumb-hover: #9ca3af;
          --scroll-track: #1f2937;
          --group-container-bg: #1a2333;
          --group-header-bg: #2a3447;
          --group-border: #475569;
          --accent-soft-bg: rgba(45, 212, 191, 0.18);
          --accent-soft-text: #5eead4;
        }
      }
      :root[data-theme="light"] {
        --bg: #f9fafb;
        --text: #111827;
        --muted: #6b7280;
        --meta: #4b5563;
        --surface: #ffffff;
        --surface-soft: #f9fafb;
        --surface-accent: #f3f4f6;
        --border: #d1d5db;
        --border-soft: #e5e7eb;
        --row-border: #f3f4f6;
        --scroll-thumb: #9ca3af;
        --scroll-thumb-hover: #6b7280;
        --scroll-track: #f3f4f6;
        --group-container-bg: #f8fafc;
        --group-header-bg: #eef2f6;
        --group-border: #cbd5e1;
        --accent-soft-bg: #ccfbf1;
        --accent-soft-text: #0f766e;
      }
      :root[data-theme="dark"] {
        --bg: #111827;
        --text: #f3f4f6;
        --muted: #9ca3af;
        --meta: #d1d5db;
        --surface: #1f2937;
        --surface-soft: #1f2937;
        --surface-accent: #374151;
        --border: #4b5563;
        --border-soft: #374151;
        --row-border: #374151;
        --scroll-thumb: #6b7280;
        --scroll-thumb-hover: #9ca3af;
        --scroll-track: #1f2937;
        --group-container-bg: #1a2333;
        --group-header-bg: #2a3447;
        --group-border: #475569;
        --accent-soft-bg: rgba(45, 212, 191, 0.18);
        --accent-soft-text: #5eead4;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        margin: 16px;
        color: var(--text);
        background: var(--bg);
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        min-height: calc(100vh - 32px);
        display: flex;
        flex-direction: column;
      }
      .header-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }
      h1 {
        margin: 0;
        line-height: 1.2;
      }
      .version-badge {
        display: inline-block;
        margin: 0;
        padding: 2px 8px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface);
        color: var(--muted);
        font-size: 12px;
      }
      .top-link {
        margin: 0;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .top-link a {
        display: inline-flex;
        align-items: center;
      }
      .top-link img {
        width: 28px;
        height: 28px;
        display: block;
        transition: filter 120ms ease;
      }
      .top-link a:hover img {
        filter: invert(34%) sepia(93%) saturate(1738%) hue-rotate(209deg)
          brightness(95%) contrast(93%);
      }
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) .top-link img {
          filter: invert(95%) sepia(6%) saturate(241%) hue-rotate(188deg)
            brightness(108%) contrast(93%);
        }
        :root:not([data-theme="light"]) .top-link a:hover img {
          filter: invert(56%) sepia(80%) saturate(1358%) hue-rotate(197deg)
            brightness(102%) contrast(93%);
        }
      }
      :root[data-theme="light"] .top-link img {
        filter: none;
      }
      :root[data-theme="dark"] .top-link img {
        filter: invert(95%) sepia(6%) saturate(241%) hue-rotate(188deg)
          brightness(108%) contrast(93%);
      }
      :root[data-theme="dark"] .top-link a:hover img {
        filter: invert(56%) sepia(80%) saturate(1358%) hue-rotate(197deg)
          brightness(102%) contrast(93%);
      }
      .toolbar {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 16px;
      }
      .filter-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .filters-toggle-btn {
        display: none;
        white-space: nowrap;
      }
      .filters-menu {
        display: block;
      }
      .filters-modal-header {
        display: none;
      }
      .filters-modal-title {
        font-weight: 700;
      }
      .preset-btns {
        display: flex;
        gap: 4px;
        flex-wrap: nowrap;
      }
      .preset-btn {
        padding: 5px 12px;
        font-size: 13px;
        border-radius: 999px;
        white-space: nowrap;
      }
      .preset-btn[aria-pressed="true"] {
        background: var(--text);
        color: var(--bg);
        border-color: var(--text);
      }
      select {
        padding: 6px 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        font-size: 14px;
        cursor: pointer;
        max-width: 220px;
      }
      .sports-toggle {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 5px 12px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface);
        color: var(--text);
        font-size: 13px;
        white-space: nowrap;
        cursor: pointer;
        user-select: none;
      }
      .sports-toggle input {
        width: 14px;
        height: 14px;
        margin: 0;
        cursor: pointer;
        accent-color: var(--text);
      }
      .sports-toggle:has(input:checked) {
        background: var(--text);
        color: var(--bg);
        border-color: var(--text);
      }
      .sports-toggle:has(input:checked) input {
        accent-color: var(--bg);
      }
      .recurring-chip {
        display: inline-block;
        margin-left: 8px;
        padding: 1px 8px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface);
        color: var(--muted);
        font-size: 11.5px;
        white-space: nowrap;
        vertical-align: 1px;
      }
      .cancelled-chip {
        display: inline-block;
        margin-left: 8px;
        padding: 1px 8px;
        border: 1px solid color-mix(in srgb, #b45309 45%, var(--border));
        border-radius: 999px;
        background: color-mix(in srgb, #f59e0b 14%, var(--surface));
        color: color-mix(in srgb, #b45309 80%, var(--text));
        font-size: 11.5px;
        white-space: nowrap;
        vertical-align: 1px;
      }
      .search-group {
        display: flex;
        align-items: stretch;
        width: min(100%, 820px);
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        overflow: hidden;
      }
      input {
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        width: 320px;
        max-width: 100%;
        flex: 1 1 240px;
      }
      .search-group input {
        border: 0;
        border-radius: 0;
        background: transparent;
        width: auto;
        max-width: none;
        min-width: 0;
        padding: 8px 12px;
      }
      button {
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
      }
      .search-group button {
        border: 0;
        border-left: 1px solid var(--border-soft);
        border-radius: 0;
        background: var(--surface-soft);
        padding: 8px 10px;
        white-space: nowrap;
      }
      .theme-toggle {
        width: 30px;
        height: 30px;
        min-width: 30px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .theme-toggle svg {
        width: 16px;
        height: 16px;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .meta {
        margin-bottom: 0;
        color: var(--meta);
      }
      .meta-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .meta-actions {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex: 0 0 auto;
      }
      .mobile-sort-wrap {
        display: none;
        margin-bottom: 10px;
      }
      .icon-btn {
        width: 30px;
        height: 30px;
        min-width: 30px;
        padding: 0;
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .icon-btn svg {
        width: 16px;
        height: 16px;
      }
      /* The filters toggle is an icon button; keep it hidden on desktop. */
      .icon-btn.filters-toggle-btn {
        display: none;
      }
      .icon-btn.filters-toggle-btn[data-active-filters="true"]::after {
        content: "";
        position: absolute;
        top: 6px;
        right: 6px;
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: currentColor;
      }
      .mobile-sort-btn {
        width: 100%;
      }
      .table-wrap {
        overflow: auto;
        -webkit-overflow-scrolling: touch;
        flex: 1;
        min-height: 0;
        max-height: none;
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        background: var(--surface);
        scrollbar-width: thin;
        scrollbar-color: var(--scroll-thumb) var(--scroll-track);
      }
      .table-wrap::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      .table-wrap::-webkit-scrollbar-track {
        background: var(--scroll-track);
      }
      .table-wrap::-webkit-scrollbar-thumb {
        background: var(--scroll-thumb);
        border-radius: 999px;
      }
      .table-wrap::-webkit-scrollbar-thumb:hover {
        background: var(--scroll-thumb-hover);
      }
      table {
        width: 100%;
        min-width: 720px;
        border-collapse: separate;
        border-spacing: 0;
        background: transparent;
      }
      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--row-border);
        text-align: left;
        vertical-align: top;
        font-size: 14px;
      }
      th {
        background: var(--surface-soft);
        font-weight: 600;
      }
      #categorySortHeader,
      #dateSortHeader {
        cursor: pointer;
        user-select: none;
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      #categorySortHeader:hover,
      #dateSortHeader:hover {
        color: var(--meta);
      }
      #categorySortHeader:focus-visible,
      #dateSortHeader:focus-visible {
        outline: 2px solid var(--text);
        outline-offset: -2px;
      }
      tr:last-child td {
        border-bottom: none;
      }
      .day-marker td {
        background: var(--surface-accent);
        color: var(--text);
        font-weight: 600;
        border-top: 1px solid var(--border-soft);
        border-bottom: 1px solid var(--border-soft);
        position: sticky;
        top: 0;
        z-index: 2;
      }
      .error-row td {
        text-align: center;
        padding: 32px 16px;
        color: var(--muted);
      }
      .error-row .error-message {
        margin-bottom: 12px;
      }
      /* Map marker clusters: the bundled MarkerCluster.Default.css colors
         are hardcoded light greens; restyle with theme variables so
         clusters follow light/dark mode. The .leaflet-container prefix
         outranks the bundled rules (which load after this inline block). */
      .leaflet-container .marker-cluster-small,
      .leaflet-container .marker-cluster-medium,
      .leaflet-container .marker-cluster-large {
        background-color: var(--accent-soft-bg);
      }
      .leaflet-container .marker-cluster-small div,
      .leaflet-container .marker-cluster-medium div,
      .leaflet-container .marker-cluster-large div {
        background-color: var(--surface-accent);
        color: var(--text);
        font-weight: 600;
      }
      /* Venue groups: header + (optionally) children render as a single
         bordered "card-in-card" container on desktop. Header and children
         use distinct tints so the container reads as a contained group,
         not just adjacent rows. Border closure is via per-cell borders. */
      .venue-group-header {
        cursor: pointer;
        user-select: none;
      }
      .venue-group-header td {
        background: var(--group-header-bg);
        padding: 12px 14px;
        border-top: 1px solid var(--group-border);
      }
      .venue-group-header td:first-child {
        border-left: 1px solid var(--group-border);
        border-top-left-radius: 10px;
      }
      .venue-group-header td:last-child {
        border-right: 1px solid var(--group-border);
        border-top-right-radius: 10px;
      }
      /* Collapsed header is the entire box; close it with bottom borders. */
      .venue-group-header[data-expanded="false"] td {
        border-bottom: 1px solid var(--group-border);
      }
      .venue-group-header[data-expanded="false"] td:first-child {
        border-bottom-left-radius: 10px;
      }
      .venue-group-header[data-expanded="false"] td:last-child {
        border-bottom-right-radius: 10px;
      }
      /* Expanded header: divider between header and first child. */
      .venue-group-header[data-expanded="true"] td {
        border-bottom: 1px solid var(--group-border);
      }
      .venue-group-header:hover td {
        background: var(--surface-accent);
      }
      .venue-group-header:focus-visible td {
        outline: 2px solid var(--text);
        outline-offset: -2px;
      }
      .venue-group-headline {
        display: flex;
        align-items: baseline;
        gap: 8px;
        flex-wrap: wrap;
      }
      .venue-group-chevron {
        display: inline-block;
        width: 12px;
        font-size: 11px;
        color: var(--meta);
        transform: rotate(0deg);
        transition: transform 120ms ease;
        flex-shrink: 0;
      }
      .venue-group-header[data-expanded="true"] .venue-group-chevron {
        transform: rotate(90deg);
      }
      .venue-group-name {
        font-weight: 700;
        font-size: 15px;
        color: var(--text);
      }
      .venue-group-address {
        color: var(--muted);
        font-weight: 400;
        font-size: 13px;
      }
      .venue-group-count-pill {
        padding: 1px 9px;
        border-radius: 999px;
        background: var(--accent-soft-bg);
        font-size: 11px;
        font-weight: 600;
        color: var(--accent-soft-text);
        line-height: 1.6;
        letter-spacing: 0.1px;
      }
      .venue-group-time-range {
        margin-left: auto;
        color: var(--muted);
        font-size: 13px;
        font-weight: 400;
      }
      .venue-group-summary {
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }
      .venue-group-summary-prefix {
        display: inline-block;
        margin-right: 8px;
        padding: 1px 7px;
        border-radius: 4px;
        background: var(--accent-soft-bg);
        color: var(--accent-soft-text);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        line-height: 1.7;
        vertical-align: 2px;
      }
      /* Children inside an expanded group use a slightly tinted background
         to read as "inside the container" and contrast with the header. */
      .venue-group-child td {
        background: var(--group-container-bg);
      }
      .venue-group-child td:first-child {
        border-left: 1px solid var(--group-border);
        padding-left: 28px;
        position: relative;
      }
      .venue-group-child td:first-child::before {
        content: "";
        position: absolute;
        left: 14px;
        top: 0;
        bottom: 0;
        width: 2px;
        background: var(--group-border);
        opacity: 0.55;
      }
      .venue-group-child td:last-child {
        border-right: 1px solid var(--group-border);
      }
      .venue-group-child td {
        border-bottom: 1px solid var(--row-border);
      }
      .venue-group-child-last td {
        border-bottom: 1px solid var(--group-border);
      }
      .venue-group-child-last td:first-child {
        border-bottom-left-radius: 10px;
      }
      .venue-group-child-last td:last-child {
        border-bottom-right-radius: 10px;
      }
      .venue-group-hidden {
        display: none !important;
      }
      .source-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 2px 8px 2px 6px;
        border: 1px solid var(--border-soft);
        border-radius: 999px;
        background: var(--surface-soft);
        color: var(--text);
        text-decoration: none;
        max-width: 100%;
      }
      .source-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .source-meta {
        display: none;
      }
      .event-title {
        font-weight: 600;
      }
      .location-link {
        color: inherit;
        text-decoration: underline;
        text-underline-offset: 2px;
        text-decoration-color: var(--border);
      }
      .location-link:hover {
        text-decoration-color: var(--text);
      }
      .category-pill {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border: 1px solid var(--border-soft);
        border-radius: 999px;
        background: var(--surface-soft);
        color: var(--text);
        font-size: 12px;
        font-weight: 600;
        line-height: 1.2;
      }
      .category-inline {
        display: block;
      }
      .source-icons-inline {
        display: none;
      }
      .source-icon-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
        border: 1px solid var(--border-soft);
        border-radius: 999px;
        background: var(--surface-soft);
        text-decoration: none;
      }
      .source-icon-link:hover {
        background: var(--surface-accent);
      }
      .source-chip:hover {
        background: var(--surface-accent);
      }
      .source-favicon {
        width: 16px;
        height: 16px;
        border-radius: 3px;
        flex: 0 0 auto;
      }
      .source-chip span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #mapContainer {
        display: none;
        flex: 1;
        min-height: 0;
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        overflow: hidden;
      }
      #tableWrapContainer {
        display: contents;
      }
      .view-toggle-btn {
        white-space: nowrap;
        flex-shrink: 0;
      }
      .pagination {
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .muted {
        color: var(--muted);
        font-size: 13px;
      }
      @media (max-width: 640px) {
        html,
        body {
          height: 100%;
          overflow: hidden;
        }
        body {
          margin: 12px;
        }
        .container {
          height: calc(100vh - 24px);
          height: calc(100svh - 24px);
          height: calc(100dvh - 24px);
          min-height: 0;
          display: flex;
          flex-direction: column;
        }
        .header-row {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 8px;
          margin-bottom: 8px;
        }
        h1 {
          font-size: 1.2rem;
          margin: 0;
          min-width: 0;
        }
        .top-link {
          margin: 0;
          width: auto;
          justify-content: flex-end;
          gap: 6px;
        }
        .top-link img {
          width: 22px;
          height: 22px;
        }
        .theme-toggle {
          width: 28px;
          height: 28px;
          min-width: 28px;
        }
        .theme-toggle svg {
          width: 16px;
          height: 16px;
        }
        .version-badge {
          margin: 0;
          padding: 1px 6px;
          font-size: 11px;
        }
        .toolbar {
          display: block;
          margin-bottom: 8px;
        }
        .icon-btn.filters-toggle-btn {
          display: inline-flex;
        }
        .filters-menu {
          position: fixed;
          inset: 0;
          z-index: 50;
          background: var(--bg);
          margin-top: 0;
          padding: 12px;
          overflow: auto;
          -webkit-overflow-scrolling: touch;
        }
        .filters-menu[data-open="false"] {
          display: none;
        }
        .filters-modal-header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 10px;
          margin-bottom: 12px;
          padding-bottom: 10px;
          border-bottom: 1px solid var(--border-soft);
        }
        .filter-row {
          display: flex;
          flex-direction: column;
          align-items: stretch;
          gap: 8px;
        }
        .preset-btns {
          width: 100%;
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
          padding-bottom: 2px;
        }
        select {
          max-width: none;
          width: 100%;
        }
        .search-group {
          width: 100%;
        }
        .search-group input {
          padding: 7px 9px;
        }
        .search-group button {
          padding: 7px 9px;
        }
        .meta {
          font-size: 13px;
          margin-bottom: 0;
          min-width: 0;
        }
        .meta-row {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 8px;
          margin-bottom: 8px;
        }
        .sports-toggle {
          align-self: flex-start;
        }
        .mobile-sort-wrap {
          display: block;
          margin-bottom: 0;
        }
        .mobile-sort-btn {
          width: auto;
          padding: 6px 9px;
          white-space: nowrap;
        }
        .table-wrap {
          flex: 1;
          min-height: 0;
          max-height: none;
        }
        table {
          min-width: 0;
        }
        thead {
          display: none;
        }
        tbody {
          display: block;
          padding: 8px;
        }
        tbody tr {
          display: block;
          margin-bottom: 8px;
          border: 1px solid var(--border-soft);
          border-radius: 10px;
          background: var(--surface);
          overflow: hidden;
          cursor: pointer;
        }
        tbody tr.event-row {
          padding: 10px;
          box-shadow: 0 2px 8px var(--border-soft);
        }
        tbody tr.event-row:focus-visible {
          outline: 2px solid var(--text);
          outline-offset: 1px;
        }
        tbody tr td {
          display: block;
          padding: 0;
          border-bottom: 1px solid var(--row-border);
          word-break: break-word;
        }
        tbody tr.event-row td {
          border-bottom: 0;
        }
        tbody tr td:last-child {
          border-bottom: none;
        }
        tbody tr td::before {
          content: none;
        }
        tbody tr.event-row .category-cell {
          margin-bottom: 6px;
        }
        tbody tr.event-row .category-inline {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 8px;
        }
        tbody tr.event-row .source-icons-inline {
          display: inline-flex;
          align-items: center;
          gap: 6px;
          flex-shrink: 0;
        }
        tbody tr.event-row .source-icon-link {
          width: 20px;
          height: 20px;
          border-radius: 999px;
          padding: 0;
        }
        tbody tr.event-row .source-icon-link .source-favicon {
          width: 16px;
          height: 16px;
        }
        tbody tr.event-row .title-cell {
          margin-bottom: 4px;
        }
        tbody tr.event-row .event-title {
          display: block;
          font-size: 16px;
          line-height: 1.3;
          font-weight: 700;
        }
        tbody tr.event-row .datetime-cell {
          margin-bottom: 4px;
          font-size: 14px;
        }
        tbody tr.event-row .location-cell {
          margin-bottom: 4px;
          color: var(--meta);
          font-size: 13px;
          line-height: 1.35;
        }
        tbody tr.event-row .source-cell {
          display: none;
        }
        tbody tr.event-row .source-list {
          display: none;
        }
        tbody tr.event-row .source-meta {
          display: block;
        }
        tbody tr.day-marker {
          margin: 12px 0 6px;
          border: 0;
          border-radius: 0;
          background: transparent;
        }
        tbody tr.day-marker td {
          display: block;
          padding: 6px 2px;
          border-top: 0;
          border-bottom: 0;
          background: var(--surface-accent);
          border-radius: 8px;
          position: static;
        }
        tbody tr.day-marker td::before {
          content: none;
        }
        tbody tr.error-row {
          border: 0;
          background: transparent;
        }
        tbody tr.error-row td {
          display: block;
          position: static;
        }
        tbody tr.error-row td::before {
          content: none;
        }
        /* Mobile: the entire venue group renders as one tall card. The
           header has top-rounded corners and the last child has bottom-
           rounded corners; intermediate edges merge so header + children
           share a single continuous outer border. Grouped child cards
           also drop the redundant location row and the day-of-week date
           prefix (the day marker above already specifies the date). */
        tbody tr.venue-group-header {
          background: var(--group-header-bg);
          border: 1px solid var(--group-border);
        }
        tbody tr.venue-group-header[data-expanded="false"] {
          margin-bottom: 8px;
          border-radius: 10px;
        }
        tbody tr.venue-group-header[data-expanded="true"] {
          margin-bottom: 0;
          border-radius: 10px 10px 0 0;
          border-bottom: 1px solid var(--border-soft);
        }
        tbody tr.venue-group-header td {
          display: block;
          padding: 10px 12px;
          border: 0;
          border-radius: 0;
          background: transparent;
        }
        tbody tr.venue-group-header .venue-group-headline {
          display: flex;
          align-items: baseline;
          gap: 8px;
          flex-wrap: wrap;
        }
        tbody tr.venue-group-header .venue-group-time-range {
          margin-left: auto;
        }
        /* Children stack flush against the header and each other to form
           one continuous card. */
        tbody tr.venue-group-child {
          background: var(--group-container-bg);
          margin-bottom: 0;
          border: 1px solid var(--group-border);
          border-top: 0;
          border-bottom: 1px solid var(--row-border);
          border-radius: 0;
          box-shadow: none;
        }
        tbody tr.venue-group-child.event-row {
          /* Inset the child content so it visually sits under the venue
             header text rather than flush against the container edge. */
          padding: 10px 12px 10px 28px;
          box-shadow: none;
        }
        tbody tr.venue-group-child-last {
          margin-bottom: 8px;
          border-bottom: 1px solid var(--group-border);
          border-bottom-left-radius: 10px;
          border-bottom-right-radius: 10px;
        }
        /* Neutralize the desktop card-in-card per-cell border + ::before
           rail; on mobile the cell-level borders would draw stray lines. */
        tbody tr.venue-group-child td:first-child {
          border-left: 0;
          padding-left: 0;
          position: static;
        }
        tbody tr.venue-group-child td:first-child::before {
          content: none;
        }
        tbody tr.venue-group-child td:last-child {
          border-right: 0;
        }
        tbody tr.venue-group-child-last td {
          border-bottom: 0;
        }
        tbody tr.venue-group-child .location-cell {
          display: none;
        }
        tbody tr.venue-group-child .datetime-day {
          display: none;
        }
        tbody tr.venue-group-child .datetime-cell {
          color: var(--muted);
          font-size: 13px;
        }
        .pagination {
          margin-top: 8px;
          flex-shrink: 0;
          display: grid;
          grid-template-columns: 1fr;
          gap: 6px;
          align-items: center;
          padding-bottom: env(safe-area-inset-bottom);
        }
        .pagination button {
          width: 100%;
          padding: 7px 9px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header-row">
        <h1>Fargoings | Goings-On in Fargo</h1>
        <div class="top-link muted">
          <button
            id="themeToggle"
            class="theme-toggle"
            type="button"
            aria-label="Toggle color theme"
          >
            Auto
          </button>
          <a
            href="https://github.com/Stan-Stani/fargoings"
            target="_blank"
            rel="noreferrer noopener"
            aria-label="GitHub repository"
            ><img
              src="/assets/GitHub_Invertocat_Black_Clearspace.svg"
              alt="GitHub"
          /></a>
          <div
            id="versionBadge"
            class="version-badge"
            aria-label="App version"
          ></div>
        </div>
      </div>
      <div class="toolbar">
        <div class="search-group">
          <input
            id="search"
            placeholder="Search title, location, city, category, source"
          />
          <button id="searchBtn">Search</button>
          <button id="clearBtn">Clear</button>
        </div>
        <div id="filtersMenu" class="filters-menu" data-open="true">
          <div class="filters-modal-header">
            <div class="filters-modal-title">Filters</div>
            <button
              id="filtersCloseBtn"
              class="icon-btn"
              type="button"
              aria-label="Close filters"
              title="Close filters"
            >
            </button>
          </div>
          <div class="filter-row">
            <div class="preset-btns" role="group" aria-label="Date range">
              <button
                class="preset-btn"
                data-preset="all"
                aria-pressed="true"
                type="button"
              >
                All
              </button>
              <button
                class="preset-btn"
                data-preset="today"
                aria-pressed="false"
                type="button"
              >
                Today
              </button>
              <button
                class="preset-btn"
                data-preset="weekend"
                aria-pressed="false"
                type="button"
              >
                This Weekend
              </button>
              <button
                class="preset-btn"
                data-preset="week"
                aria-pressed="false"
                type="button"
              >
                This Week
              </button>
            </div>
            <select id="categoryFilter" aria-label="Filter by category">
              <option value="">All categories</option>
            </select>
            <label class="sports-toggle">
              <input
                id="showSportsToggle"
                type="checkbox"
                aria-label="Show sports schedules in the feed"
              />
              Show sports
            </label>
            <label class="sports-toggle">
              <input
                id="showRepeatsToggle"
                type="checkbox"
                aria-label="Show every date of repeating events"
              />
              Show repeats
            </label>
            <div class="mobile-sort-wrap">
              <button
                id="mobileCategorySortBtn"
                class="mobile-sort-btn"
                type="button"
                aria-label="Toggle category sorting within each day"
                aria-pressed="false"
              >
                Category sort: Off
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="meta-row">
        <div id="meta" class="meta">Loading…</div>
        <div class="meta-actions">
          <button
            id="filtersToggleBtn"
            class="icon-btn filters-toggle-btn"
            type="button"
            aria-controls="filtersMenu"
            aria-expanded="false"
          ></button>
          <button
            id="viewToggleBtn"
            class="view-toggle-btn"
            type="button"
            aria-label="Switch to map view"
          >
            Map view
          </button>
        </div>
      </div>
      <div id="mapContainer"></div>
      <div id="tableWrapContainer">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th id="dateSortHeader">Date ▲</th>
                <th>Location</th>
                <th id="categorySortHeader">Category</th>
                <th>Source</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </div>
      <div class="pagination">
        <button id="loadMoreBtn" type="button">Load more</button>
      </div>
    </div>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script type="module" src="/main.ts"></script>
  </body>
</html>
