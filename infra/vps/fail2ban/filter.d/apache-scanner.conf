# Bans IPs probing for vulnerabilities (.env, wp-admin, .git, php, etc.).
# None of these paths exist on any site this server hosts, so any request
# for them is hostile by definition — no legitimate UA ever asks for them.
# Repo copy: fargoings/infra/vps/fail2ban/filter.d/apache-scanner.conf
[Definition]
failregex = (?i)^<HOST> \S+ \S+ .*"[A-Z]+ [^"]*(?:\.env|\.git|\.aws|\.ssh|wp-admin|wp-login|wp-config|wp-includes|wp-content|wordpress|xmlrpc|phpmyadmin|phpunit|/vendor/|/actuator|/solr/|/owa/|/autodiscover|/cgi-bin/|hnap1|boaform|gponform|geoserver|/etc/passwd|\.php[ ?/]|\.sql[ ?]|\.bak[ ?])[^"]*"
ignoreregex =
